<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Letter For You ❤️</title>

    <link rel="stylesheet" href="page2.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div id="stars"></div>
    <div id="hearts"></div>
    <div id="shooting-stars"></div>

    <div class="moon"></div>

    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <!-- Envelope -->

<section class="wrapper">

    <div class="birthday-card" id="card">

        <!-- Front -->

        <div class="card-face card-front">

            <h1>Happy Birthday ❤️</h1>

            <h2>Shashi</h2>

            <p>
                A little surprise<br>
                made with love.
            </p>

            <button id="flipBtn">
                Open Card 💌
            </button>

        </div>

        <!-- Back -->

        <div class="card-face card-back">

            <h1>Happy Birthday ❤️</h1>

            <div id="typedText"></div>

            <div id="poem" class="poem">

                <p>

                    Among a million shining stars,<br>
                    You are the brightest light.<br><br>

                    Among a thousand flowers,<br>
                    You are the sweetest sight.<br><br>

                    Happy Birthday,<br>
                    My Special person❤️

                </p>

            </div>

            <button id="nextBtn">
                Continue 🎂
            </button>

        </div>

    </div>

</section>    <script src="page2.js"></script>

</body>

</html>
