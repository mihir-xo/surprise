<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Cake 🎂</title>

    <link rel="stylesheet" href="page3.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div id="stars"></div>

    <div id="hearts"></div>

    <div id="shooting-stars"></div>

    <div class="moon"></div>

    <div class="glow glow-left"></div>

    <div class="glow glow-right"></div>

    <!-- Main -->

    <main class="container">

        <h1>

            Make a Wish ✨

        </h1>

        <p>

            Click every candle to blow it out 💨

        </p>

        <!-- Cake -->

        <div class="cake">

            <!-- Candles -->

            <div class="candles">

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

            </div>

            <!-- Cake Top -->

            <div class="icing"></div>

            <!-- Cake Layer -->

            <div class="layer">

                <span>Happy Birthday ❤️</span>

            </div>

            <!-- Cake Base -->

            <div class="base"></div>

        </div>

        <h2 id="wishMessage">

            🎉 Yay! Happy Birthday! 🎉

        </h2>

        <button id="nextBtn">

            Continue 🎆

        </button>

    </main>

    <!-- Confetti -->

    <div id="confetti"></div>

    <script src="page3.js"></script>

</body>

</html>
