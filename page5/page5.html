<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="page5.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- BACKGROUND -->
<div id="stars"></div>
<div id="hearts"></div>

<div class="moon"></div>
<div class="glow glow-left"></div>
<div class="glow glow-right"></div>

<!-- MAIN -->
<main class="container">

    <h1>Our Memories ❤️</h1>

    <p>Every moment with you is my favorite story ✨</p>

    <!-- PHOTO GALLERY -->
    <div class="gallery">

        <div class="card"><img src="img1.jpg"><span>My Favorite Smile 💖</span></div>
        <div class="card"><img src="img2.jpg"><span>Our Laughs 😂</span></div>
        <div class="card"><img src="img3.jpg"><span>Beautiful You ✨</span></div>
        <div class="card"><img src="img4.jpg"><span>My Safe Place 🤍</span></div>
        <div class="card"><img src="img5.jpg"><span>Forever Us 💜</span></div>

    </div>

    <!-- MESSAGE -->
    <div class="love-message">

        <h2>I Love You ❤️</h2>

        <p>
            I don’t know what the future holds,<br>
            but I know I want you in every part of it.<br><br>

            Today, tomorrow, and forever ❤️
        </p>

    </div>

    <button id="restartBtn">Replay Surprise 🔁</button>

</main>

<script src="page5.js"></script>

</body>

</html>
