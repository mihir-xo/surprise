<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="page1.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Night Sky -->
    <div id="stars"></div>

    <!-- Shooting Stars -->
    <div id="shooting-stars"></div>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- Sparkles -->
    <div id="sparkles"></div>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Background Glow -->
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <!-- Hero -->
    <main class="hero">

        <p class="subtitle reveal delay1">
            A LITTLE SURPRISE FOR YOU
        </p>

        <h1 class="title reveal delay2">
            Happy<br>
            Birthday
        </h1>

        <h2 class="love reveal delay3">
            ❤️ My Dear Iron Women ❤️
        </h2>

        <p class="message reveal delay4">

            I made something special just for you.

            <br><br>

            A special Gift for My Special Person

        </p>

        <button id="giftBtn" class="gift-btn reveal delay5">

            🎁 Open My Gift

        </button>

    </main>

    <script src="page1.js"></script>

</body>

</html>
