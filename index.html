<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loading Your Surprise ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>

        :root{

            --bg1:#14082F;
            --bg2:#25115A;
            --bg3:#3B237E;

            --pink:#FF8FC7;
            --lav:#CDB4FF;
            --gold:#FFD166;

        }

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            font-family:Poppins,sans-serif;

            background:
            linear-gradient(
                180deg,
                var(--bg1),
                var(--bg2),
                var(--bg3)
            );

            color:white;

            position:relative;

        }

        /* Stars */

        .star{

            position:absolute;

            background:white;

            border-radius:50%;

            animation:twinkle linear infinite;

        }

        @keyframes twinkle{

            0%,100%{

                opacity:.2;

            }

            50%{

                opacity:1;

            }

        }

        /* Content */

        .loader{

            text-align:center;

            z-index:10;

        }

        h1{

            font-family:"Great Vibes",cursive;

            font-size:4rem;

            color:white;

            text-shadow:
            0 0 20px var(--pink);

        }

        p{

            margin-top:15px;

            color:#FFDCEB;

            letter-spacing:2px;

        }

        /* Heart */

        .heart{

            font-size:80px;

            margin:40px 0;

            animation:beat 1s infinite;

            filter:drop-shadow(0 0 20px var(--pink));

        }

        @keyframes beat{

            0%,100%{

                transform:scale(1);

            }

            50%{

                transform:scale(1.15);

            }

        }

        /* Loading */

        .dots{

            display:flex;

            justify-content:center;

            gap:12px;

            margin-top:20px;

        }

        .dots span{

            width:12px;
            height:12px;

            border-radius:50%;

            background:var(--gold);

            animation:bounce 1s infinite;

        }

        .dots span:nth-child(2){

            animation-delay:.2s;

        }

        .dots span:nth-child(3){

            animation-delay:.4s;

        }

        @keyframes bounce{

            50%{

                transform:translateY(-10px);

            }

        }

    </style>

</head>

<body>

<div class="loader">

    <h1>Just One Moment...</h1>

    <div class="heart">❤️</div>

    <p>Preparing your surprise...</p>

    <div class="dots">

        <span></span>
        <span></span>
        <span></span>

    </div>

</div>

<script>

/* Stars */

for(let i=0;i<180;i++){

    const star=document.createElement("div");

    star.className="star";

    const size=Math.random()*3+1;

    star.style.width=size+"px";

    star.style.height=size+"px";

    star.style.left=Math.random()*100+"vw";

    star.style.top=Math.random()*100+"vh";

    star.style.animationDuration=(2+Math.random()*4)+"s";

    document.body.appendChild(star);

}

/* Redirect */

setTimeout(()=>{

    window.location.href="page1/page1.html";

},2500);

</script>

</body>

</html>
